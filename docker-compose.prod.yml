# -----------------------------------------------------------------------------
# Hai lớp file env:
#
# A) `.env` ở thư mục này — chỉ cho Docker Compose (thay ${...} trong YAML).
#    Không dùng apps/api/.env.production để thay biến trong file compose — nên
#    API_HOST_PORT / WEB_HOST_PORT / POSTGRES_HOST_PORT / POSTGRES_* / MINIO_ROOT_* đặt trong `.env` gốc.
#
# B) apps/api/.env.production & apps/web/.env.production — nạp vào container (runtime Node).
#
# Sao chép: .env.example → .env ; các file example trong apps/* → .env.production
# -----------------------------------------------------------------------------

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expense_splitter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [app]
    # Cổng máy chủ (trái): POSTGRES_HOST_PORT trong `.env` gốc — mặc định 5432 (đổi nếu trùng cổng local)
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [app]

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [app]
    ports:
      - '9000:9000'
      - '9001:9001'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: apps/api/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks: [app]
    # Cổng máy chủ (trái): API_HOST_PORT trong .env gốc; phải = PORT trong container (mặc định 4000).
    ports:
      - '${API_HOST_PORT:-4000}:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        # Trùng domain web public (https) — dùng cho og:image / chia sẻ Facebook; phải khớp apps/web/.env.production
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        # Trùng URL/host:port ảnh MinIO mà trình duyệt tải (thường = MINIO_PUBLIC_URL phía API hoặc http://IP:9000)
        MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://localhost:9000}
        MINIO_PORT: ${MINIO_PORT:-}
        MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    restart: always
    env_file: apps/web/.env.production
    depends_on:
      - api
    networks: [app]
    # Cổng máy chủ (bên trái): đặt WEB_HOST_PORT trong .env gốc, mặc định 3000. Bên phải = cổng trong container (Next PORT=3000).
    ports:
      - '${WEB_HOST_PORT:-3000}:3000'

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
