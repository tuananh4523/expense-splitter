# Triển khai lên server qua SSH: build Docker + compose up (Makefile).
# Luôn deploy đúng nhánh Git kích hoạt workflow (github.ref_name).
# Cần Secrets + xem README (giới hạn nhánh push nếu chỉ muốn deploy main/staging).

name: Deploy to server

on:
  push:
    branches:
      - 'v.1.0.0'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            BRANCH="${{ github.ref_name }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            make build
            make up
